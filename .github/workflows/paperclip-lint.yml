# CI gate for SIN-62276 (ADR 0075 §2 D2 / §5):
#
# Runs the paperclip-lint analyzers' analystest fixtures and then drives
# the bundled multichecker over the real internal/webhook/ and
# internal/adapter/ trees as a `go vet` tool. Either step failing blocks
# merge.
#
# The lint can be temporarily disabled in an emergency by setting the
# repository variable PAPERCLIP_LINT_DISABLED=1 — but the box on the
# corresponding tracking issue MUST be checked, with a justification, and
# the suspension reverted in <24h. (Reversibility lens, ADR 0075.)
name: paperclip-lint

on:
  pull_request:
    paths:
      - "internal/webhook/**"
      - "internal/adapter/**"
      - "tools/lint/**"
      - "cmd/paperclip-lint/**"
      - ".github/workflows/paperclip-lint.yml"
      - "go.mod"
      - "go.sum"
  push:
    branches: [main]

jobs:
  paperclip-lint:
    runs-on: ubuntu-latest
    if: ${{ vars.PAPERCLIP_LINT_DISABLED != '1' }}
    # Pin the toolchain so `go` never auto-downloads a `toolchain@…` module at
    # runtime. setup-go already installs the exact version from go.mod's
    # `toolchain` directive; `GOTOOLCHAIN=local` forces every `go` invocation to
    # use *that* binary. Without it, GOTOOLCHAIN=auto could fetch a different
    # patch release into a cache the setup-go restore didn't cover, producing the
    # intermittent `cache entry not found: bad checksum` failure in
    # tools/lint/nobodyreread's analysistest (SIN-65397). Reversible: drop this
    # env block to restore auto behaviour.
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      # Pre-build the standard library so the cgo export data for packages the
      # lint fixtures import transitively (net → C) is in the build cache before
      # analysistest type-checks them. On a cold/partial cache analysistest could
      # otherwise hit `could not import C (no metadata for C)` while loading the
      # `net` package, skipping the analysis and flaking the job (SIN-65397).
      - name: warm build cache (stdlib incl. cgo export data)
        run: go build std

      - name: analystest fixtures (positive + negative cases)
        run: go test ./tools/lint/nobodyreread/... ./tools/lint/nomathrand/... ./tools/lint/nosecrets/... -count=1 -race -cover

      - name: build paperclip-lint vet tool
        run: go build -o ./bin/paperclip-lint ./cmd/paperclip-lint

      - name: run paperclip-lint over webhook + adapter trees
        run: |
          # On a fresh branch the webhook tree may not exist yet — list the
          # targets that DO exist before invoking go vet so the workflow is
          # green for branches that haven't landed the production code path.
          targets=()
          for p in ./internal/webhook/... ./internal/adapter/...; do
            dir="${p%/...}"
            if [ -d "$dir" ]; then
              targets+=("$p")
            fi
          done
          if [ ${#targets[@]} -eq 0 ]; then
            echo "no webhook/adapter targets present on this branch — skipping vet step"
            exit 0
          fi
          go vet -vettool=$(pwd)/bin/paperclip-lint "${targets[@]}"

      - name: enforce >=85% coverage on tools/lint/{nobodyreread,nomathrand,nosecrets}
        run: |
          go test ./tools/lint/nobodyreread/... ./tools/lint/nomathrand/... ./tools/lint/nosecrets/... \
            -count=1 \
            -coverpkg=./tools/lint/nobodyreread,./tools/lint/nomathrand,./tools/lint/nosecrets \
            -coverprofile=coverage.out
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {sub("%","",$3); print $3}')
          echo "coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit !(p+0 >= 85.0) }' || {
            echo "coverage ${pct}% below 85% threshold (SIN-62276 quality bar)"
            exit 1
          }
